<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Bot Widget</title>
<style>
  :root{
    --brand:#5b54e8; --brand-2:#7d78f0; --ink:#222033;
    --surface:rgba(255,255,255,.97); --dock:rgba(26,28,46,.58);
  }
  html, body { margin:0; height:100%; background:transparent; overflow:hidden;
               font-family:"Noto Sans TC", system-ui, sans-serif; -webkit-font-smoothing:antialiased; }
  #stage { position:absolute; inset:0; }
  #avatar-canvas { width:100%; height:100%; display:block; }

  /* ===== еә•йғЁжҺ§еҲ¶ dockпјҲжҜӣзҺ»з’ғпјү===== */
  #control-bar {
    position:absolute; left:50%; bottom:10px; transform:translateX(-50%);
    display:flex; gap:5px; align-items:center; padding:6px; border-radius:18px;
    background:var(--dock); backdrop-filter:blur(10px) saturate(1.3); -webkit-backdrop-filter:blur(10px) saturate(1.3);
    box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.12);
  }
  .ctrl {
    appearance:none; border:none; cursor:pointer; color:#fff; background:rgba(255,255,255,.14);
    height:36px; min-width:36px; padding:0 9px; border-radius:12px; flex-shrink:0; white-space:nowrap;
    display:inline-flex; align-items:center; justify-content:center; gap:5px;
    font-size:13.5px; font-weight:600; line-height:1;
    transition:transform .12s, background .15s, filter .15s;
  }
  .ctrl:hover { background:rgba(255,255,255,.26); }
  .ctrl:active { transform:scale(.93); }
  .ctrl:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  .ctrl.primary { background:linear-gradient(135deg,var(--brand-2),var(--brand)); padding:0 13px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .ctrl.primary:hover { filter:brightness(1.1); background:linear-gradient(135deg,var(--brand-2),var(--brand)); }
  .ctrl.listening { background:linear-gradient(135deg,#e74c3c,#c0392b)!important; animation:pulse 1.1s infinite; }
  .ctrl.llm-on { background:linear-gradient(135deg,#f2b34f,#e69426); } /* е•ҹз”ЁдёӯпјқзҗҘзҸҖпјҢиҲҮдё»иүІйқӣи—Қе°ҚжҜ” */
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,.55);} 50%{ box-shadow:0 0 0 7px rgba(231,76,60,0);} }

  /* ===== е°Қи©ұжіЎжіЎпјҲеё¶е°ҫе·ҙпјү===== */
  #bubble {
    position:absolute; right:14px; top:14px; left:14px;
    background:var(--surface); color:var(--ink); border-radius:16px; padding:11px 14px;
    font-size:14px; line-height:1.55;
    box-shadow:0 10px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(91,84,232,.1);
    opacity:0; transform:translateY(-8px) scale(.98); transform-origin:top center;
    transition:opacity .22s, transform .22s; pointer-events:none;
  }
  #bubble::after { content:""; position:absolute; right:38px; bottom:-7px; width:14px; height:14px;
    background:var(--surface); transform:rotate(45deg); }
  #bubble.show { opacity:1; transform:none; }

  /* ===== зҜ„дҫӢжҸҗзӨәжё…е–® ===== */
  #suggestions {
    position:absolute; left:10px; right:10px; bottom:58px;
    display:flex; flex-wrap:wrap; gap:6px; justify-content:center; pointer-events:auto;
  }
  #suggestions .sg-label {
    width:100%; text-align:center; font-size:11px; font-weight:600; color:#fff; letter-spacing:.3px;
    text-shadow:0 1px 4px rgba(0,0,0,.55); margin-bottom:2px;
  }
  .sugg {
    appearance:none; cursor:pointer; white-space:nowrap;
    background:rgba(255,255,255,.92); color:var(--brand); border:1px solid rgba(91,84,232,.22);
    border-radius:999px; font-size:12px; font-weight:600; padding:6px 12px;
    box-shadow:0 3px 10px rgba(0,0,0,.16); transition:transform .12s, background .15s;
  }
  .sugg:hover { background:#fff; transform:translateY(-1px); }
  .sugg:active { transform:scale(.96); }
  .sugg:focus-visible { outline:2px solid #fff; outline-offset:2px; }

  #direct-warn {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#f4f6f8; color:#556; font-size:15px; text-align:center; padding:24px;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="bubble"></div>
    <canvas id="avatar-canvas"></canvas>
    <div id="suggestions"></div>
    <div id="control-bar" role="toolbar" aria-label="иҷӣж“¬дәәжҺ§еҲ¶еҲ—">
      <button class="ctrl primary" id="btn-mic"   aria-label="й–Ӣе§ӢиӘһйҹіе°Қи©ұ"><span aria-hidden="true">рҹҺӨ</span> иӘӘи©ұ</button>
      <button class="ctrl" id="btn-llm"   aria-label="е•ҹз”ЁзҖҸиҰҪеҷЁе…§ AI еӨ§и…ҰпјҲйҰ–ж¬ЎйңҖдёӢијүжЁЎеһӢпјү" aria-pressed="false"><span aria-hidden="true">рҹ§ </span></button>
      <button class="ctrl" id="btn-mute"  aria-label="йқңйҹі" aria-pressed="false"><span aria-hidden="true">рҹ”Ҡ</span></button>
      <button class="ctrl" id="btn-speed" aria-label="иӘҝж•ҙиӘһйҖҹ">1.0Г—</button>
      <button class="ctrl" id="btn-close" aria-label="ж”¶иө·еҠ©зҗҶ"><span aria-hidden="true">вң•</span></button>
    </div>
  </div>
  <div id="direct-warn">и«ӢйҖҸйҒҺ <code>embed.js</code> ијүе…ҘжӯӨе…ғд»¶гҖӮ</div>

  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
  <script src="knowledge.js"></script>

  <!-- M4bпјҡWebLLMпјҲзҖҸиҰҪеҷЁе…§и·‘е°ҸжЁЎеһӢпјҢйӣ¶йҮ‘й‘°пјүгҖӮз”Ё module ијүе…ҘпјҢжҠҠжҺ§еҲ¶ж¬ҠжҺӣеҲ° window.LLM -->
  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";
    const LLM_MODEL = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC"; // дёӯж–ҮдёҚйҢҜгҖҒзҙ„ 1.1GBгҖҒйҰ–ж¬ЎдёӢијүеҫҢжңғиў«еҝ«еҸ–
    let engine = null, loadingPromise = null;
    window.LLM = {
      supported: ('gpu' in navigator),
      state: 'idle',        // idle | loading | ready | error
      progress: 0,
      model: LLM_MODEL,
      async load(onProgress) {
        if (engine) return engine;
        if (loadingPromise) return loadingPromise;
        window.LLM.state = 'loading';
        loadingPromise = webllm.CreateMLCEngine(LLM_MODEL, {
          initProgressCallback: (p) => { window.LLM.progress = p.progress || 0; if (onProgress) onProgress(p); }
        }).then((e) => { engine = e; window.LLM.state = 'ready'; return e; })
          .catch((err) => { window.LLM.state = 'error'; window.LLM.error = String(err); throw err; });
        return loadingPromise;
      },
      async chat(messages) {
        if (!engine) return null;
        const r = await engine.chat.completions.create({ messages, temperature: 0.4, max_tokens: 220 });
        return r && r.choices && r.choices[0] && r.choices[0].message.content;
      }
    };
  </script>

  <script>
  // ===== еҸҜиЁӯе®ҡпјҲз”ұ embed.js йҖҸйҒҺ query её¶е…Ҙпјүпјҡзҡ®=жЁЎеһӢ / иӮүзҡ„иӘһйҹі=еҫҢз«Ҝ / е…§е®№=зҹҘиӯҳеә« =====
  const CFG = new URLSearchParams(location.search);
  const MODEL_URL = CFG.get('model') || 'https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display/test/assets/haru/haru_greeter_t03.model3.json';
  const TTS_ENDPOINT = CFG.get('api') || 'api/tts';   // жІ’иЁӯвҶ’и©ҰеҗҢз«ҷзӣёе°Қи·Ҝеҫ‘пјӣжҠ“дёҚеҲ°вҶ’иҮӘеӢ•йҖҖеӣһзҖҸиҰҪеҷЁиӘһйҹіпјҲзҙ”еүҚз«ҜеҸҜз”Ёпјү
  const KNOWLEDGE_URL = CFG.get('knowledge') || '';
  if (KNOWLEDGE_URL) { fetch(KNOWLEDGE_URL).then(r => r.json()).then(kb => { if (Array.isArray(kb)) window.KB = kb; }).catch(() => {}); }

  // ===== жЁЎзө„еұӨзӢҖж…Ӣ =====
  let model = null, app = null;
  let isSpeaking = false, mouthValue = 0, mouthTarget = 0.7;
  let lipIds = ['ParamMouthOpenY'];
  let ttsMuted = false, ttsRate = 1.0, ttVoice = null;
  let audioMouth = 0, useAudioMouth = false, audioCtx = null;
  let speakSeq = 0, currentSource = null, currentRaf = 0; // жҺ§еҲ¶гҖҢй»һз¬¬дәҢдёӢжү“ж–·з¬¬дёҖдёӢгҖҚ
  let neuralDisabled = false; // жҠ“дёҚеҲ°зҘһз¶“иӘһйҹіеҫҢз«Ҝе°ұйҺ–е®ҡзҖҸиҰҪеҷЁиӘһйҹіпјҢйҒҝе…ҚжҜҸеҸҘйғҪжү“ 404
  const NEURAL_VOICE = CFG.get('voice') || 'zh-TW-HsiaoChenNeural'; // еҫ®и»ҹзҘһз¶“иӘһйҹігҖҢжӣүиҮ»гҖҚпјҲеҸҜз”Ё data-voice иҰҶи“Ӣпјү
  let recognition = null, listening = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  // ===== йҳІжӯўиў«зӣҙжҺҘй–ӢпјҲеёёиҰӢз¶Із«ҷ widget зҡ„гҖҢзҰҒжӯўзӣҙжҺҘиЁӘе•ҸгҖҚжҸҗзӨәпјӣзҙ” UXпјҢйқһе®үе…ЁжҺ§еҲ¶пјүпјҢз•ҷ ?dev=1 зөҰй–Ӣзҷј =====
  const isEmbedded = window.self !== window.top;
  const devBypass  = new URLSearchParams(location.search).has('dev');
  if (!isEmbedded && !devBypass) {
    document.getElementById('stage').style.display = 'none';
    document.getElementById('direct-warn').style.display = 'flex';
  } else {
    bootAvatar();
  }

  // ===== и·ҹзҲ¶й ҒжәқйҖҡ =====
  function postToParent(type, payload) {
    try { window.parent.postMessage(Object.assign({ ns: 'avatar-widget', type }, payload || {}), '*'); } catch (e) {}
  }
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.ns !== 'avatar-widget-host') return;
    if (d.type === 'say') speak(String(d.text || '').slice(0, 600));
    // жіЁж„ҸпјҡдёҚжҺҘеҸ—з”Ё postMessage йҒ з«Ҝе•ҹеӢ•йәҘе…ӢйўЁпјҲlistenпјүпјҢйҒҝе…ҚжғЎж„ҸзҲ¶й ҒеҒ·й–ӢйәҘпјӣйәҘе…ӢйўЁеҸӘз”ұдҪҝз”ЁиҖ…й»һж“Ҡи§ёзҷј
  });

  function showBubble(text) {
    const b = document.getElementById('bubble');
    b.textContent = text; b.classList.add('show');
    clearTimeout(showBubble._t);
    showBubble._t = setTimeout(() => b.classList.remove('show'), 6000);
  }

  // ===== TTSпјҡй–ӢеҸЈиӘӘи©ұ + е°Қеҳҙ =====
  function loadVoice() {
    const vs = speechSynthesis.getVoices();
    const pick = (re) => vs.find(v => re.test(v.name + ' ' + v.lang) && !/Google/i.test(v.name)); // йҒҝй–Ӣ Chrome жңғйқңй»ҳеӨұж•—зҡ„ Google йҒ з«ҜиӘһйҹі
    ttVoice =
         pick(/(HsiaoChen|HsiaoYu|жӣүиҮ»|жӣүйӣЁ).*zh/i)        // еҫ®и»ҹзҘһз¶“еҘіиҒІпјҲжңҖиҮӘз„¶пјҢиӢҘжңүе®үиЈқпјү
      || pick(/(Yating|Zhiwei).*zh[-_]TW/i)               // ијғж–°гҖҒијғдёҚж©ҹжў°зҡ„еҫ®и»ҹ zh-TW еҘіиҒІ
      || pick(/Microsoft.*zh[-_]TW/i)                      // д»»дҪ•еҫ®и»ҹ zh-TWпјҲжң¬ең°гҖҒеҸҜйқ пјү
      || pick(/zh[-_]TW/i)
      || pick(/^zh/i)
      || vs.find(v => /zh/i.test(v.lang))
      || null;
  }
  if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); }

  // дёӯжӯўзӣ®еүҚжӯЈеңЁи¬ӣзҡ„пјҲзҘһз¶“иӘһйҹійҹіжӘ” + зҖҸиҰҪеҷЁ TTS + е°ҚеҳҙпјүпјҢзөҰгҖҢй»һз¬¬дәҢдёӢжү“ж–·з¬¬дёҖдёӢгҖҚз”Ё
  function stopSpeaking() {
    try { if ('speechSynthesis' in window) speechSynthesis.cancel(); } catch (e) {}
    try { clearInterval(speakBrowser._poll); } catch (e) {}
    if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
    if (currentSource) { try { currentSource.onended = null; currentSource.stop(); } catch (e) {} currentSource = null; }
    isSpeaking = false; useAudioMouth = false; audioMouth = 0;
  }

  // е°ҚеӨ–е…ҘеҸЈпјҡе…Ҳи©Ұ edge-tts зҘһз¶“иӘһйҹі(зңҹдәәж„ҹ + зІҫжә–е°Қеҳҙ)пјҢеӨұж•—иҮӘеӢ•йҖҖеӣһзҖҸиҰҪеҷЁиӘһйҹі
  function speak(text) {
    const myseq = ++speakSeq;          // жҜҸж¬ЎиӘӘи©ұдёҖеҖӢеәҸиҷҹпјҢз”ЁдҫҶеҲӨж–·жҳҜеҗҰе·Іиў«ж–°й»һж“ҠеҸ–д»Ј
    showBubble(text);
    postToParent('speaking', { text });
    if (ttsMuted) return;
    stopSpeaking();                    // з«ӢеҲ»жү“ж–·дёҠдёҖж®ө
    if (neuralDisabled) { speakBrowser(text); return; }   // жІ’жңүзҘһз¶“иӘһйҹіеҫҢз«Ҝ вҶ’ зӣҙжҺҘз”ЁзҖҸиҰҪеҷЁиӘһйҹі
    speakNeural(text, myseq).catch((e) => {
      if (myseq !== speakSeq) return;  // е·Іиў«жӣҙж–°зҡ„й»һж“ҠеҸ–д»Ј вҶ’ дёҚиҰҒйҖҖеӣһж’ӯж”ҫ
      const msg = (e && e.message) || '';
      if (/http 4\d\d|Failed to fetch|NetworkError|Load failed/i.test(msg)) neuralDisabled = true; // зөҗж§ӢжҖ§еӨұж•—(з„ЎеҫҢз«Ҝ/CORS/иў«ж“Ӣ)вҶ’дёҚеҶҚи©ҰзҘһз¶“иӘһйҹі
      console.warn('зҘһз¶“иӘһйҹіеӨұж•—пјҢйҖҖеӣһзҖҸиҰҪеҷЁиӘһйҹіпјҡ', msg);
      useAudioMouth = false;
      speakBrowser(text);
    });
  }

  // edge-tts зҘһз¶“иӘһйҹіпјҡжҠ“ /api/tts зҡ„ MP3пјҢз”Ё Web Audio ж’ӯж”ҫдёҰд»ҘгҖҢеҜҰйҡӣйҹійҮҸгҖҚй©…еӢ•еҳҙеһӢ
  async function speakNeural(text, seq) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try { await audioCtx.resume(); } catch (e) {} }
    const sep = TTS_ENDPOINT.indexOf('?') < 0 ? '?' : '&';
    const resp = await fetch(TTS_ENDPOINT + sep + 'voice=' + encodeURIComponent(NEURAL_VOICE) + '&text=' + encodeURIComponent(text));
    if (seq !== speakSeq) return;                       // жҠ“еӣһдҫҶжҷӮе·Іиў«ж–°й»һж“ҠеҸ–д»Ј вҶ’ ж”ҫжЈ„пјҲйҒҝе…ҚйҮҚз–Ҡпјү
    if (!resp.ok) throw new Error('http ' + resp.status);
    const arr = await resp.arrayBuffer();
    if (seq !== speakSeq) return;
    if (arr.byteLength < 800) throw new Error('audio too small');
    const audioBuf = await audioCtx.decodeAudioData(arr);
    if (seq !== speakSeq) return;                       // и§ЈзўјеҫҢжңҖеҫҢзўәиӘҚпјҢиҲҠйҹіжӘ”дёҚжҗ¶ж’ӯ
    const src = audioCtx.createBufferSource(); src.buffer = audioBuf;
    const analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
    src.connect(analyser); analyser.connect(audioCtx.destination);
    const data = new Uint8Array(analyser.fftSize);
    currentSource = src;
    useAudioMouth = true; isSpeaking = true;
    if (model) try { model.motion('Tap'); } catch (e) {}
    const loop = () => {
      if (currentSource !== src) return;                // дёҚжҳҜжҲ‘еңЁж’ӯдәҶе°ұеҒң
      analyser.getByteTimeDomainData(data);
      let sum = 0; for (let i = 0; i < data.length; i++) { const v = (data[i] - 128) / 128; sum += v * v; }
      audioMouth = Math.min(1, Math.sqrt(sum / data.length) * 3.4); // RMS йҹійҮҸ вҶ’ й–ӢеҸЈ
      currentRaf = requestAnimationFrame(loop);
    };
    currentRaf = requestAnimationFrame(loop);
    src.onended = () => {                               // иҮӘз„¶ж’ӯе®ҢжүҚж”¶е°ҫпјӣиў«жү“ж–·жҷӮ onended е·Іиў«жё…жҺү
      if (currentSource !== src) return;
      if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
      isSpeaking = false; useAudioMouth = false; audioMouth = 0;
      currentSource = null;
    };
    src.start(0);
  }

  // еҫҢеӮҷпјҡзҖҸиҰҪеҷЁе…§е»әиӘһйҹі(Yating)гҖӮе°Қеҳҙз¶ҒгҖҢеҜҰйҡӣжҳҜеҗҰеңЁзҷјиҒІгҖҚпјҢдёҚдҫқиіҙеҗ„иӘһйҹідёҚдёҖиҮҙзҡ„дәӢд»¶
  function speakBrowser(text) {
    if (ttsMuted || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    if (!ttVoice) loadVoice();
    if (ttVoice) u.voice = ttVoice;
    u.lang = (ttVoice && ttVoice.lang) || 'zh-TW';
    u.rate = ttsRate; u.pitch = 1.0;
    u.onboundary = () => { mouthTarget = 0.5 + Math.random() * 0.5; };
    u.onend = () => { isSpeaking = false; clearInterval(speakBrowser._poll); };
    const fire = () => {
      speechSynthesis.speak(u);
      isSpeaking = true; mouthTarget = 0.7; if (model) try { model.motion('Tap'); } catch (e) {}
      const t0 = performance.now();
      clearInterval(speakBrowser._poll);
      speakBrowser._poll = setInterval(() => {
        const elapsed = performance.now() - t0;
        const active = speechSynthesis.speaking || speechSynthesis.pending;
        if ((elapsed > 1000 && !active) || elapsed > 16000) { isSpeaking = false; clearInterval(speakBrowser._poll); }
      }, 150);
    };
    if (speechSynthesis.speaking || speechSynthesis.pending) { speechSynthesis.cancel(); setTimeout(fire, 130); }
    else fire();
  }

  // ===== еӨ§и…ҰпјҡM4 жӘўзҙў + M4bпјҲWebLLMпјүз”ҹжҲҗ =====
  // дёӯж–ҮдёҚеҘҪж–·и©һпјҢж”№з”ЁгҖҢеӯ—е…ғ bigramпјҲзӣёй„°е…©еӯ—пјүгҖҚзӣёдјјеәҰпјҢе°Қдёӯж–ҮеҫҲжңүж•ҲгҖҒеҸҲдёҚз”Ёд»»дҪ•еҮҪејҸеә«гҖӮ
  function bigrams(s) {
    s = (s || '').toLowerCase().replace(/[\sпјҢгҖӮгҖҒпјҹпјҒ,.?!~пҪһ]/g, '');
    const g = [];
    for (let i = 0; i < s.length - 1; i++) g.push(s.slice(i, i + 2));
    if (s.length === 1) g.push(s);
    return g;
  }
  function similarity(query, text) {
    const A = bigrams(query), B = new Set(bigrams(text));
    if (!A.length || !B.size) return 0;
    let hit = 0; for (const x of A) if (B.has(x)) hit++;
    return hit / Math.sqrt(A.length * B.size);
  }
  function scoreEntry(q, e) {
    let score = Math.max(similarity(q, e.q), similarity(q, e.kw || ''));
    const terms = (e.kw || '').split(/\s+/).filter(Boolean);
    for (const t of terms) { if (t.length >= 2 && q.includes(t)) score = Math.max(score, 0.5 + t.length * 0.04); }
    return score;
  }
  function topK(q, k) {
    return (window.KB || []).map(e => ({ e, s: scoreEntry(q, e) }))
      .sort((a, b) => b.s - a.s).slice(0, k).filter(x => x.s > 0.05).map(x => x.e);
  }
  // жӘўзҙўејҸеӣһзӯ”пјҲйӣ¶йҮ‘й‘°гҖҒеҚіжҷӮгҖҒж°ёйҒ еҸҜз”Ёзҡ„еҫҢеӮҷпјү
  function brain(qRaw) {
    const q = (qRaw || '').trim();
    if (!q) return 'жҲ‘еҘҪеғҸжІ’иҒҪжё…жҘҡпјҢеҸҜд»ҘеҶҚиӘӘдёҖж¬Ўе—Һпјҹ';
    let best = null, bestScore = 0;
    for (const e of (window.KB || [])) { const s = scoreEntry(q, e); if (s > bestScore) { bestScore = s; best = e; } }
    if (best && bestScore >= 0.16) return best.a;
    return 'дҪ е•Ҹзҡ„жҳҜгҖҢ' + q + 'гҖҚе°Қеҗ§пјҹйҖҷйЎҢжҲ‘зҡ„зҹҘиӯҳеә«йӮ„жІ’ж”¶йҢ„пҪһдҪ еҸҜд»Ҙе•ҸжҲ‘еҒҘжӘўж–№жЎҲгҖҒй җзҙ„гҖҒе ұе‘ҠгҖҒиІ»з”ЁжҲ–жӘўжҹҘжіЁж„ҸдәӢй …е–”гҖӮ';
  }
  // жңүе•ҹз”Ё WebLLM жҷӮпјҢз”ЁгҖҢжӘўзҙўеҲ°зҡ„иіҮж–ҷ + LLMгҖҚз”ҹжҲҗжӣҙиҮӘз„¶зҡ„еӣһзӯ”пјӣеҗҰеүҮйҖҖеӣһжӘўзҙўејҸ
  async function answer(q) {
    q = (q || '').trim();
    if (!q) return 'жҲ‘еҘҪеғҸжІ’иҒҪжё…жҘҡпјҢеҸҜд»ҘеҶҚиӘӘдёҖж¬Ўе—Һпјҹ';
    if (window.LLM && window.LLM.state === 'ready') {
      const ctx = topK(q, 3).map(e => 'Qпјҡ' + e.q + '\nAпјҡ' + e.a).join('\n---\n');
      const messages = [
        { role: 'system', content: 'дҪ жҳҜгҖҢеҸҜеөҢе…Ҙд»»дҪ•з¶Із«ҷзҡ„иӘһйҹіиҷӣж“¬дәәе…ғд»¶гҖҚзҡ„зӨәзҜ„еҠ©жүӢгҖӮдё»йЎҢжҳҜж•ҷдәәгҖҢжҖҺйәјжҠҠйҖҷеҖӢе…ғд»¶иЈқеҲ°иҮӘе·ұзҡ„з¶Із«ҷгҖҒжҖҺйәјжҸӣжҲҗиҮӘе·ұзҡ„и§’иүІгҖҒжҖҺйәјдҪҝз”ЁгҖҚгҖӮи«Ӣз”Ёз№Ғй«”дёӯж–ҮгҖҒеҸЈиӘһгҖҒжңҖеӨҡе…©дёүеҸҘи©ұз°Ўзҹӯеӣһзӯ”гҖӮе„Әе…Ҳдҫқж“ҡгҖҗеҸғиҖғиіҮж–ҷгҖ‘еӣһзӯ”пјӣиіҮж–ҷжІ’жңүзҡ„е°ұз”Ёеёёиӯҳз°ЎзҹӯеӣһжҮүпјҢдёҚзўәе®ҡе°ұиҖҒеҜҰиӘӘдёҚзҹҘйҒ“гҖӮ\n\nгҖҗеҸғиҖғиіҮж–ҷгҖ‘\n' + (ctx || 'пјҲз„Ўпјү') },
        { role: 'user', content: q }
      ];
      try {
        showBubble('и®“жҲ‘жғіжғівҖҰ');
        const out = await window.LLM.chat(messages);
        if (out && out.trim()) return out.trim();
      } catch (e) { console.warn('LLM error', e); }
    }
    return brain(q);
  }

  function handleUser(text) {
    if (text) showBubble('дҪ пјҡ' + text);
    Promise.resolve().then(async () => { speak(await answer(text)); });
  }

  // ===== STTпјҡиҒҪдҪ иӘӘи©ұ =====
  function setMic(on) {
    const b = document.getElementById('btn-mic');
    b.classList.toggle('listening', on);
    b.textContent = on ? 'в—Ҹ иҒҶиҒҪдёӯ' : 'рҹҺӨ иӘӘи©ұ';
    const sg = document.getElementById('suggestions');
    if (sg) sg.style.display = on ? 'none' : 'flex'; // иҒҶиҒҪдёӯж”¶иө·жё…е–®
  }
  function startListening() {
    if (!SR) { speak('дҪ зҡ„зҖҸиҰҪеҷЁдёҚж”ҜжҸҙиӘһйҹіиҫЁиӯҳпјҢе»әиӯ°з”Ё Chrome й–Ӣе–”гҖӮ'); return; }
    if (listening && recognition) { recognition.stop(); return; }
    try { recognition = new SR(); } catch (e) { speak('иӘһйҹіиҫЁиӯҳе•ҹеӢ•еӨұж•—пјҡ' + e.message); return; }
    recognition.lang = 'zh-TW'; recognition.interimResults = true;
    recognition.continuous = false; recognition.maxAlternatives = 1;
    recognition.onstart  = () => { listening = true; setMic(true); showBubble('иҒҶиҒҪдёӯвҖҰи«ӢиӘӘи©ұ рҹҺҷпёҸ'); };
    recognition.onresult = (e) => {
      let txt = ''; for (const r of e.results) txt += r[0].transcript;
      const last = e.results[e.results.length - 1];
      if (last.isFinal) handleUser(txt.trim());
      else showBubble('гҖҢ' + txt + 'гҖҚвҖҰ');
    };
    recognition.onerror = (e) => { listening = false; setMic(false);
      showBubble(e.error === 'not-allowed' ? 'жҲ‘йңҖиҰҒйәҘе…ӢйўЁж¬ҠйҷҗжүҚиғҪиҒҪдҪ иӘӘи©ұе–”гҖӮ' : 'жІ’иҒҪжё…жҘҡпјҲ' + e.error + 'пјүпјҢеҶҚи©ҰдёҖж¬ЎгҖӮ'); };
    recognition.onend   = () => { listening = false; setMic(false); };
    try { recognition.start(); } catch (e) {}
  }

  // ===== Live2D ијүе…Ҙ + е°Қеҳҙ =====
  async function bootAvatar() {
    try {
      const Live2DModel = PIXI.live2d.Live2DModel;
      try { Live2DModel.registerTicker(PIXI.Ticker); } catch (e) {}

      app = new PIXI.Application({
        view: document.getElementById('avatar-canvas'),
        autoStart: true, backgroundAlpha: 0, antialias: true,
        resizeTo: document.getElementById('stage'),
      });

      model = await Live2DModel.from(MODEL_URL);
      app.stage.addChild(model);
      model.anchor.set(0.5, 1.0);

      // й—ңжҺү Live2D жЁЎеһӢиҮӘеё¶зҡ„пјҲж—Ҙж–ҮпјүеӢ•дҪңиӘһйҹі вҖ” еҸӘдҝқз•ҷжҲ‘еҖ‘иҮӘе·ұзҡ„ TTSпјҲе…©иҖ…дҫҶжәҗдёҚеҗҢпјҢдә’дёҚеҪұйҹҝпјү
      try { if (PIXI.live2d.SoundManager) PIXI.live2d.SoundManager.volume = 0; } catch (e) {}
      try {
        const ms = (model.internalModel.settings && model.internalModel.settings.motions) || {};
        for (const g of Object.keys(ms)) (ms[g] || []).forEach(d => { delete d.Sound; delete d.sound; });
      } catch (e) {}

      function fit() {
        const w = app.renderer.width, h = app.renderer.height;
        const nativeH = (model.internalModel && model.internalModel.height) || 1000;
        model.scale.set((h / nativeH) * 0.95);
        model.x = w / 2; model.y = h;
      }
      fit(); window.addEventListener('resize', fit);

      try {
        const groups = (model.internalModel.settings.groups) || [];
        const g = groups.find(x => (x.Name || '').toLowerCase() === 'lipsync');
        if (g && g.Ids && g.Ids.length) lipIds = g.Ids;
      } catch (e) {}

      // е°Қеҳҙпјҡж””жҲӘ coreModel.updateпјҲиЁҲз®—й Ӯй»һеүҚзҡ„жңҖеҫҢдёҖеҲ»еҜ«е…Ҙеҳҙе·ҙпјҢдҝқиӯүдёҚиў« motion/loadParameters жҙ—жҺүпјү
      try {
        const core = model.internalModel.coreModel;
        const origUpdate = core.update.bind(core);
        core.update = function () {
          if (isSpeaking && useAudioMouth) {
            mouthValue += (audioMouth - mouthValue) * 0.5;          // зҘһз¶“иӘһйҹіпјҡи·ҹзңҹеҜҰйҹійҮҸзІҫжә–е°Қеҳҙ
          } else if (isSpeaking) {
            const t = performance.now() / 1000;
            mouthValue = 0.12 + (0.83 * mouthTarget) * Math.abs(Math.sin(t * 9)); // зҖҸиҰҪеҷЁиӘһйҹіпјҡеҒҮй–ӢеҗҲ
          } else {
            mouthValue = Math.max(0, mouthValue - 0.18);
          }
          for (const id of lipIds) { try { core.setParameterValueById(id, mouthValue); } catch (e) {} }
          return origUpdate();
        };
      } catch (e) {}

      model.on('hit', () => onTap());
      document.getElementById('avatar-canvas').addEventListener('pointerdown', onTap);

      setTimeout(() => showBubble('й»һ рҹҺӨ и·ҹжҲ‘иӘӘи©ұпјӣжғіжӣҙиҒ°жҳҺеҸҜжҢү рҹ§  е•ҹз”Ё AI еӨ§и…Ұ рҹ‘Ӣ'), 700);
      postToParent('ready');
      window.__avatarModel = model;
    } catch (err) {
      console.error(err);
      postToParent('error', { message: err.message });
    }
  }

  function onTap() {
    if (onTap._lock) return;                 // еҺ»жҠ–пјҡhit дәӢд»¶иҲҮ pointerdown еҸҜиғҪеҗҢжҷӮи§ёзҷј
    onTap._lock = true;
    setTimeout(() => { onTap._lock = false; }, 400);
    if (model) try { model.motion('Tap'); } catch (e) {}
    speak('дҪ еҘҪпҪһжҲ‘жҳҜеҸҜд»ҘеөҢе…Ҙд»»дҪ•з¶Із«ҷзҡ„иӘһйҹіиҷӣж“¬дәәпјҢе•ҸжҲ‘жҖҺйәје®үиЈқгҖҒжҖҺйәјжҸӣжҲҗдҪ зҡ„и§’иүІйғҪиЎҢпјҒ');
  }

  // ===== жҺ§еҲ¶еҲ— =====
  document.getElementById('btn-close').onclick = () => postToParent('close');

  // зҜ„дҫӢжҸҗзӨәжё…е–®пјҡдёҖйҖІз«ҷе°ұе‘ҠиЁҙдҪҝз”ЁиҖ…гҖҢеҸҜд»ҘиӘӘд»ҖйәјгҖҚпјҢй»һд»»дёҖй …пјқзӣҙжҺҘе•ҸпјҲиӘһйҹі/жү“еӯ—йғҪдёҚз”Ёе…ҲзҢңпјү
  (function renderSuggestions() {
    const box = document.getElementById('suggestions');
    if (!box) return;
    const SUGGESTIONS = ['жҖҺйәје®үиЈқпјҹ', 'жҖҺйәјжҸӣжҲҗжҲ‘зҡ„и§’иүІпјҹ', 'иҰҒдёҚиҰҒйҢўпјҹ', 'йәҘе…ӢйўЁжҖҺйәјз”Ёпјҹ', 'жҲ‘еҸҜд»ҘиӘӘд»Җйәјпјҹ'];
    const label = document.createElement('div'); label.className = 'sg-label'; label.textContent = 'рҹ’¬ дҪ еҸҜд»Ҙе•ҸжҲ‘пјҡ';
    box.appendChild(label);
    SUGGESTIONS.forEach((s) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'sugg'; b.textContent = s;
      b.onclick = () => handleUser(s.replace(/пјҹ$/, ''));
      box.appendChild(b);
    });
  })();
  document.getElementById('btn-mic').onclick   = () => startListening();
  document.getElementById('btn-mute').onclick  = () => {
    ttsMuted = !ttsMuted;
    const mb = document.getElementById('btn-mute');
    mb.textContent = ttsMuted ? 'рҹ”Ү' : 'рҹ”Ҡ';
    mb.setAttribute('aria-pressed', String(ttsMuted));
    if (ttsMuted) stopSpeaking(); // з«ӢеҲ»еҒңжҺүжӯЈеңЁж’ӯзҡ„пјҲзҘһз¶“иӘһйҹі + зҖҸиҰҪеҷЁиӘһйҹіпјү
    showBubble(ttsMuted ? 'е·Ійқңйҹі' : 'е·Ій–Ӣе•ҹиӘһйҹі');
  };
  document.getElementById('btn-speed').onclick = () => {
    const steps = [0.9, 1.0, 1.2, 1.4];
    ttsRate = steps[(steps.indexOf(ttsRate) + 1) % steps.length] || 1.0;
    document.getElementById('btn-speed').textContent = ttsRate.toFixed(1) + 'Г—';
    showBubble('иӘһйҖҹпјҡ' + ttsRate.toFixed(1) + 'Г—');
  };
  document.getElementById('btn-llm').onclick = async () => {
    const btn = document.getElementById('btn-llm');
    if (!window.LLM || !window.LLM.supported) { showBubble('йҖҷеҖӢиЈқзҪ®дёҚж”ҜжҸҙ WebGPUпјҢе…Ҳз”ЁзҹҘиӯҳеә«жЁЎејҸе°ұеҘҪпјҲеҠҹиғҪдёҖжЁЈеҸҜз”ЁпјүгҖӮ'); return; }
    if (window.LLM.state === 'ready')   { showBubble('AI еӨ§и…Ұе·Іе•ҹз”ЁпјҢе•ҸжҲ‘е•ҸйЎҢеҗ§ рҹ§ '); return; }
    if (window.LLM.state === 'loading') { showBubble('AI еӨ§и…Ұијүе…ҘдёӯвҖҰ ' + Math.round(window.LLM.progress * 100) + '%'); return; }
    showBubble('й–Ӣе§ӢдёӢијү AI еӨ§и…ҰпјҲзҙ„ 1GBпјҢеҸӘйңҖз¬¬дёҖж¬ЎпјүвҖҰ');
    try {
      await window.LLM.load((p) => { btn.textContent = 'рҹ§  ' + Math.round((p.progress || 0) * 100) + '%'; });
      btn.textContent = 'рҹ§ вң“'; btn.classList.add('llm-on');
      speak('AI еӨ§и…Ұе•ҹз”Ёе®ҢжҲҗпјҢзҸҫеңЁжҲ‘еҸҜд»ҘиҒҠеҫ—жӣҙиҮӘз„¶еӣүпјҒ');
    } catch (e) { btn.textContent = 'рҹ§ вң—'; showBubble('AI еӨ§и…Ұијүе…ҘеӨұж•—пјҡ' + (e && e.message || e)); }
  };
  </script>
